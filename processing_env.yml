name: bnd
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults
dependencies:
  - pip
  - python=3.9.*
  - typer
  - pynwb
  - pandas
  - scipy
  - spikeinterface
  - psutil
  - numpy>=1.20.0,<2.0.0
  - scikit-learn
  - tqdm
  - numba
  - faiss-cpu
  - libblas=*=*mkl
  - pytest
  # CUDA
  - pytorch-cuda=11.8
  - pytorch
  - pynvml
  # GUI
  - matplotlib
  - pip:
    - pyqtgraph>=0.13.0
    - qtpy
    - pyqt6
    - pyqt6.sip
    - ndx_pose
    - neuroconv~=0.6.0
    - -e .
